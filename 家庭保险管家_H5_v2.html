<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#0a0e17;color:#e2e8f0;line-height:1.6;min-height:100vh}
header{background:linear-gradient(135deg,#141923,#1a2332);padding:14px 12px;border-bottom:1px solid #1e293b;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
header h1{font-size:18px;color:#d4a853}
header .actions{display:flex;gap:4px;flex-wrap:wrap}
.btn{padding:7px 14px;border-radius:20px;border:1px solid #2a3344;background:#1a2332;color:#e2e8f0;font-size:13px;cursor:pointer;transition:.2s;white-space:nowrap;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.btn:active{opacity:.7}
.btn-gold{background:#d4a853;color:#0a0e17;border-color:#d4a853;font-weight:600}
.btn-red{background:rgba(239,68,68,.15);border-color:#ef4444;color:#f87171}
.btn-blue{background:rgba(59,130,246,.15);border-color:#3b82f6;color:#93c5fd}
.btn-sm{padding:4px 10px;font-size:11px}
nav{display:flex;gap:4px;padding:8px 12px;overflow-x:auto;background:#0f131c;border-bottom:1px solid #1e293b;position:sticky;top:0;z-index:50;-webkit-overflow-scrolling:touch}
nav a{color:#94a3b8;text-decoration:none;font-size:12px;white-space:nowrap;padding:5px 10px;border-radius:16px;background:#141923;border:1px solid #1e293b;flex-shrink:0}
nav a:hover,nav a.active{color:#d4a853;border-color:#d4a853;background:#1a2332}
section{padding:14px;display:none}
section.active{display:block}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:linear-gradient(145deg,#141923,#1a2332);border-radius:16px;padding:14px;text-align:center;border:1px solid #1e293b}
.stat-card .num{font-size:26px;font-weight:700;color:#d4a853;display:block}
.stat-card .label{font-size:11px;color:#94a3b8;margin-top:4px}
.stat-card.alert{border-color:#ef4444}
.tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.tag-red{background:rgba(239,68,68,.2);color:#f87171}
.tag-orange{background:rgba(245,158,11,.2);color:#fbbf24}
.tag-yellow{background:rgba(234,179,8,.2);color:#facc15}
.tag-green{background:rgba(16,185,129,.2);color:#34d399}
.tag-blue{background:rgba(59,130,246,.2);color:#93c5fd}
.member-card{background:#141923;border-radius:16px;padding:16px;margin-bottom:14px;border:1px solid #1e293b}
.member-card .mc-header{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.member-card .mc-name{font-size:17px;font-weight:700;color:#f1f5f9}
.member-card .mc-info{font-size:12px;color:#94a3b8}
.member-card .mc-premium{font-size:20px;font-weight:700;color:#d4a853;margin-left:auto}
.member-card .mc-actions{display:flex;gap:4px;flex-wrap:wrap}
.policy-card{background:#1a2332;border-radius:12px;padding:12px;margin-bottom:6px;border:1px solid #2a3344}
.policy-card .pc-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.policy-card .pc-title{font-weight:700;font-size:13px;color:#f1f5f9}
.policy-card .pc-company{font-size:11px;color:#64748b}
.policy-card .pc-premium{font-size:17px;font-weight:700;color:#d4a853;text-align:right}
.policy-card .pc-detail{font-size:12px;color:#94a3b8;margin-top:4px;line-height:1.6}
.policy-card .pc-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.policy-tag{font-size:10px;padding:2px 7px;border-radius:8px;background:rgba(30,41,59,.8);border:1px solid #2a3344;color:#94a3b8}
.policy-tag.green{color:#34d399;border-color:rgba(16,185,129,.3)}
.policy-tag.orange{color:#fbbf24;border-color:rgba(245,158,11,.3)}
.policy-tag.red{color:#f87171;border-color:rgba(239,68,68,.3)}
.policy-tag.blue{color:#93c5fd;border-color:rgba(59,130,246,.3)}

.gap-item{background:#1a2332;border-radius:12px;padding:12px;margin-bottom:8px;border-left:3px solid #ef4444}
.gap-item.p1{border-left-color:#f59e0b}
.gap-item.p2{border-left-color:#eab308}
.gap-item .gap-title{font-weight:700;font-size:13px;color:#f1f5f9}
.gap-item .gap-desc{font-size:12px;color:#94a3b8;margin-top:4px}
.rec-card{background:#141923;border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid #2a3344}
.rec-card .r-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.rec-card .r-name{font-weight:700;font-size:14px;color:#f1f5f9}
.rec-card .r-company{font-size:11px;color:#64748b}
.rec-card .r-price{font-size:18px;font-weight:700;color:#d4a853;text-align:right}
.rec-card .r-dims{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:8px;font-size:11px}
@media(max-width:480px){.rec-card .r-dims{grid-template-columns:1fr}}
.rec-card .r-dim-label{color:#64748b;font-size:10px}
.rec-card .r-dim-val{color:#cbd5e1}
.rec-card .r-dim-val.good{color:#34d399}
.rec-card .r-dim-val.warn{color:#fbbf24}
.rec-card .r-reason{margin-top:8px;padding:8px 10px;background:rgba(212,168,83,.04);border-radius:8px;font-size:11px;color:#94a3b8;line-height:1.6}
.rec-card .r-reason strong{color:#d4a853}
.rec-card.no-price .r-price{display:none}
.date-bar{display:flex;justify-content:space-between;font-size:11px;color:#64748b;margin-top:6px;padding-top:6px;border-top:1px solid #1e293b;flex-wrap:wrap;gap:4px}
h2{font-size:17px;color:#d4a853;margin-bottom:14px;padding-bottom:6px;border-bottom:1px solid #1e293b}
h3{font-size:14px;color:#f1f5f9;margin:14px 0 8px}
table{width:100%;border-collapse:collapse;font-size:12px;margin:10px 0}
th{text-align:left;padding:8px 6px;color:#94a3b8;font-weight:500;border-bottom:1px solid #1e293b;font-size:11px}
td{padding:8px 6px;border-bottom:1px solid #1a2332}
.note{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:10px;margin:8px 0;font-size:12px;color:#f87171}
.note-info{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:10px;padding:10px;margin:8px 0;font-size:12px;color:#93c5fd}
.empty-state{text-align:center;padding:40px 12px;color:#64748b}
.empty-state .icon{font-size:40px;margin-bottom:10px}
.empty-state p{font-size:13px;margin-bottom:12px}
footer{text-align:center;padding:20px;color:#475569;font-size:11px;border-top:1px solid #1e293b;margin-top:24px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:12px}
.modal{background:#141923;border:1px solid #2a3344;border-radius:16px;padding:18px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal h3{color:#d4a853;margin-bottom:14px;font-size:15px}
.form-group{margin-bottom:10px}
.form-group label{display:block;font-size:11px;color:#94a3b8;margin-bottom:3px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 10px;border-radius:10px;border:1px solid #2a3344;background:#1a2332;color:#e2e8f0;font-size:14px;font-family:inherit}
.form-group textarea{min-height:50px;resize:vertical}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#d4a853}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.policy-actions{display:flex;gap:2px}
.demo-banner{background:rgba(212,168,83,.1);border:1px solid rgba(212,168,83,.3);border-radius:10px;padding:10px 12px;margin-bottom:14px;font-size:12px;color:#d4a853;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}

/* 自动补全 */
.ac-wrapper{position:relative}
.ac-dropdown{position:absolute;top:100%;left:0;right:0;background:#1a2332;border:1px solid #2a3344;border-radius:0 0 10px 10px;max-height:200px;overflow-y:auto;z-index:300;display:none}
.ac-dropdown.show{display:block}
.ac-item{padding:10px 12px;font-size:13px;color:#cbd5e1;cursor:pointer;border-bottom:1px solid rgba(42,51,68,.5);display:flex;justify-content:space-between;align-items:center}
.ac-item:hover,.ac-item.active{background:rgba(212,168,83,.1);color:#d4a853}
.ac-item .ac-name{flex:1}.ac-item .ac-type{font-size:10px;color:#64748b;margin-left:8px;white-space:nowrap}
.ac-item .ac-price{font-size:11px;color:#d4a853;margin-left:8px;white-space:nowrap}
.ac-no-match{padding:8px 12px;font-size:12px;color:#64748b;text-align:center}

.upload-area{border:2px dashed #2a3344;border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:.2s;margin-top:4px}
.upload-area:hover{border-color:#d4a853}
.upload-area.has-img{border-style:solid;border-color:#2a3344;padding:8px}
.upload-area input[type=file]{display:none}
.upload-area .upload-hint{font-size:12px;color:#64748b}
.upload-area img{max-width:100%;max-height:180px;border-radius:8px}
.ocr-status{font-size:11px;color:#93c5fd;margin-top:6px;display:none}
.ocr-note{font-size:10px;color:#64748b;margin-top:4px}
@media(max-width:480px){
  header h1{font-size:16px}
  .btn{padding:5px 10px;font-size:12px}
  nav{padding:6px 8px;gap:3px}
  nav a{font-size:11px;padding:4px 7px}
  section{padding:10px}
  .grid4{grid-template-columns:1fr 1fr}
  .stat-card{padding:10px}
  .stat-card .num{font-size:22px}
  .form-row{grid-template-columns:1fr}
  .member-card{padding:12px}
  .member-card .mc-header{flex-direction:column}
}
</style>
</head>

function genId(){ return 'id_'+Date.now()+'_'+Math.random().toString(36).substr(2,6); }
function getMember(id){ return FAMILY.members.find(function(m){return m.id===id;}); }
function getPolicies(mid){ return FAMILY.policies.filter(function(p){return p.memberId===mid;}); }
function fmt(v){ return v||'-'; }
function tagCls(t){ if(!t)return''; if(t.indexOf('终身')>-1||t.indexOf('20年')>-1)return'green'; if(t.indexOf('6年')>-1)return'orange'; if(t.indexOf('1年')>-1||t.indexOf('不保证')>-1)return'red'; return''; }

function renderNav() {
  var nav=document.getElementById('main-nav');

  ['概览','成员保单','缺口诊断','推荐方案','续保追踪','保费汇总'].forEach(function(label,i){
    var ids=['sec-overview','sec-members','sec-gaps','sec-recommend','sec-renewal','sec-summary'];
    var a=document.createElement('a');
    a.href='#'+ids[i]; a.textContent=label;
    if (i===2||i===3||i===4){ var b=document.createElement('span'); b.className='badge'; b.id='badge-'+ids[i]; b.textContent='0'; a.appendChild(b); }
    a.onclick=function(e){ e.preventDefault(); switchSection(ids[i]); };

    nav.appendChild(a);
  });

function switchSection(id) {
  document.querySelectorAll('section').forEach(function(s){s.classList.remove('active');});
  var sec=document.getElementById(id); if(sec)sec.classList.add('active');
  document.querySelectorAll('nav a').forEach(function(a){a.classList.remove('active');});
  var link=document.querySelector('nav a[href="#'+id+'"]'); if(link)link.classList.add('active');
  window.scrollTo({top:(sec?sec.offsetTop-100:0),behavior:'smooth'});
}

function saveMember(){
  var obj={
    name:document.getElementById('mf-name').value.trim(),
    age:parseInt(document.getElementById('mf-age').value)||0,
    role:document.getElementById('mf-role').value,
    医保:document.getElementById('mf-insurance').value,
    负债:document.getElementById('mf-debt').value.trim(),
    notes:document.getElementById('mf-notes').value.trim()
  };
  if(!obj.name||!obj.age){alert('请填写姓名和年龄');return;}
  if(editingMemberId){var m=getMember(editingMemberId);if(!m)return;Object.keys(obj).forEach(function(k){m[k]=obj[k];});}
  else{obj.id=genId();FAMILY.members.push(obj);}
  isDemo=false; saveData(); closeModal(); renderAll();
}

function deleteMember(id){
  if(!confirm('确定删除该成员及其所有保单？'))return;
  FAMILY.members=FAMILY.members.filter(function(m){return m.id!==id;});
  FAMILY.policies=FAMILY.policies.filter(function(p){return p.memberId!==id;});
  isDemo=false; saveData(); renderAll();
}

    // 自动补全行

    '<div class="ac-wrapper"><input id="pf-name" autocomplete="off" value="'+(p?escHtml(p.name):'')+'" placeholder="输入产品名称关键词...">'+
    '<div class="ac-dropdown" id="ac-dropdown"></div></div></div>'+
    '<div class="form-row"><div class="form-group"><label>保险公司 *</label><input id="pf-company" value="'+(p?escHtml(p.company):'')+'" placeholder="如：太平洋健康"></div>'+
    '<div class="form-group"><label>保险类型 *</label><select id="pf-type">'+
      ['百万医疗','意外险','重疾险','定寿','防癌险','惠民保','车险','家财险','综合险','其他'].map(function(t){return'<option'+(p&&p.type===t?' selected':'')+'>'+t+'</option>';}).join('')+
    '</select></div></div>'+
    '<div class="form-row"><div class="form-group"><label>年保费 (¥) *</label><input id="pf-premium" type="number" value="'+(p?p.premium:'')+'" placeholder="如：443"></div>'+
    '<div class="form-group"><label>保额/保障额度</label><input id="pf-coverage" value="'+(p&&p.coverage?escHtml(p.coverage):'')+'" placeholder="如：400万"></div></div>'+
    '<div class="form-row"><div class="form-group"><label>续保条件</label><select id="pf-guarantee"><option value="">请选择</option>'+
      ['终身保证续保','20年保证续保','6年保证续保','1年期','1年不保证续保','其他'].map(function(g){return'<option'+(p&&p.guaranteedYears===g?' selected':'')+'>'+g+'</option>';}).join('')+

    '<div class="form-group"><label>标签（逗号分隔）</label><input id="pf-tags" value="'+(p&&p.tags?escHtml(p.tags):'')+'" placeholder="如：含CAR-T,0免赔,20年保证"></div>'+
    '<div class="form-group"><label>保障详情</label><textarea id="pf-detail" placeholder="如：一般医疗200万·重疾400万·含质子重离子·免赔1万">'+(p&&p.detail?escHtml(p.detail):'')+'</textarea></div>'+
    // 截图上传
    '<div class="form-group"><label>📎 保单截图/PDF（选填，供参考存档）</label>'+

    '<input type="file" id="pf-screenshot" accept="image/*,.pdf" onchange="handleScreenshot(this)">'+
    '<div class="upload-hint" id="upload-hint">📷 点击上传保单截图或PDF<br><span style="font-size:10px">支持 JPG/PNG/PDF · 图片将存为 base64</span></div>'+
    '<img id="upload-preview" style="display:none">'+
    '</div>'+
    '<div class="ocr-status" id="ocr-status">🤖 AI 识别中...</div>'+

    '<div class="form-actions"><button class="btn" onclick="closeModal()">取消</button><button class="btn btn-gold" onclick="savePolicy()">保存</button></div>';

  setTimeout(function(){

    input.addEventListener('focus',function(){ if(input.value)searchProducts(input.value,dropdown); });
    input.addEventListener('keydown',function(e){ handleAcKeydown(e,input,dropdown); });
    document.addEventListener('click',function(e){ if(!input.contains(e.target)&&!dropdown.contains(e.target))dropdown.classList.remove('show'); });

function savePolicy(){
  var obj={
    memberId:editingPolicyMemberId,
    type:document.getElementById('pf-type').value,
    name:document.getElementById('pf-name').value.trim(),
    company:document.getElementById('pf-company').value.trim(),
    premium:parseInt(document.getElementById('pf-premium').value)||0,
    coverage:document.getElementById('pf-coverage').value.trim(),
    guaranteedYears:document.getElementById('pf-guarantee').value,
    effective:document.getElementById('pf-effective').value,
    expiry:document.getElementById('pf-expiry').value||'终身',
    tags:document.getElementById('pf-tags').value.trim(),
    detail:document.getElementById('pf-detail').value.trim()
  };
  if(!obj.name||!obj.company||!obj.type||!obj.premium){alert('请填写保单名称、公司、类型和保费');return;}
  if(screenshotData)obj.screenshot=screenshotData;
  if(editingPolicyId){var e=FAMILY.policies.find(function(p){return p.id===editingPolicyId;});if(!e)return;Object.keys(obj).forEach(function(k){e[k]=obj[k];});}
  else{obj.id=genId();FAMILY.policies.push(obj);}
  isDemo=false; saveData(); closeModal(); renderAll();
}

function deletePolicy(id){
  if(!confirm('确定删除该保单？'))return;
  FAMILY.policies=FAMILY.policies.filter(function(p){return p.id!==id;});
  isDemo=false; saveData(); renderAll();
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function exportData(){
  var blob=new Blob([JSON.stringify(FAMILY,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a'); a.href=url; a.download='家庭保险数据_'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

function importData(input){
  var file=input.files[0]; if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(!data.members||!Array.isArray(data.members)||!data.policies||!Array.isArray(data.policies))throw new Error('格式不正确');
      if(!confirm('将导入 '+data.members.length+' 位成员和 '+data.policies.length+' 份保单。会覆盖当前数据，确认？'))return;
      FAMILY=data; isDemo=false; saveData(); renderAll();
    }catch(err){alert('导入失败：'+err.message);}
  };
  reader.readAsText(file); input.value='';
}

function resetAll(){
  if(!confirm('确定清空所有数据？建议先导出备份。'))return;
  FAMILY={members:[],policies:[]}; isDemo=false; saveData(); renderAll();
}

function loadDemo(){
  FAMILY=clone(getDemoData()); isDemo=true; saveData(); renderAll();
}

function showModal(html){document.getElementById('modal-content').innerHTML=html;document.getElementById('modal').style.display='flex';}
function closeModal(){document.getElementById('modal').style.display='none';editingMemberId=null;editingPolicyId=null;editingPolicyMemberId=null;screenshotData=null;}

// ============================================================
//  自动补全 — 从产品数据库搜索匹配
// ============================================================
var acIndex=-1;
function searchProducts(query,dropdown){
  dropdown.innerHTML=''; acIndex=-1;
  if(!query||query.trim().length<1){dropdown.classList.remove('show');return;}
  var q=query.trim().toLowerCase();
  var matches=InsuranceEngine.PRODUCTS.filter(function(p){
    return p.active && (p.name.toLowerCase().indexOf(q)>-1||p.company.toLowerCase().indexOf(q)>-1||p.type.indexOf(q)>-1);
  }).slice(0,8);

  if(matches.length===0){
    dropdown.innerHTML='<div class="ac-no-match">未匹配到产品 · 可手动填写下方信息</div>';
    dropdown.classList.add('show'); return;
  }
  matches.forEach(function(p,i){
    var price=InsuranceEngine.getProductPrice(p, 30)||'—';
    var item=document.createElement('div');
    item.className='ac-item'; item.setAttribute('data-idx',i);
    item.innerHTML='<span class="ac-name">'+p.name+'</span><span class="ac-type">'+p.type+'</span><span class="ac-price">~¥'+price+'/年</span>';
    item.addEventListener('click',function(){ selectProduct(p); });
    item.addEventListener('mouseenter',function(){ acIndex=i; });
    dropdown.appendChild(item);
  });
  dropdown.classList.add('show');
}

function handleAcKeydown(e,input,dropdown){
  var items=dropdown.querySelectorAll('.ac-item');
  if(e.key==='ArrowDown'){ e.preventDefault(); acIndex=Math.min(acIndex+1,items.length-1); highlightAc(items); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); acIndex=Math.max(acIndex-1,-1); highlightAc(items); }
  else if(e.key==='Enter'){ e.preventDefault();
    if(acIndex>=0&&items[acIndex]){
      items[acIndex].click();
    }
  }
  else if(e.key==='Escape'){ dropdown.classList.remove('show'); acIndex=-1; }
}

function highlightAc(items){
  items.forEach(function(item,i){ item.classList.toggle('active',i===acIndex); });
}

function selectProduct(prod){
  document.getElementById('pf-name').value=prod.name;
  document.getElementById('pf-company').value=prod.company;
  document.getElementById('pf-type').value=prod.type;
  document.getElementById('pf-coverage').value=prod.coverage||'';
  document.getElementById('pf-guarantee').value=prod.guaranteeType||'';
  document.getElementById('pf-tags').value=(prod.features||[]).slice(0,5).join(',');
  document.getElementById('pf-detail').value='保额：'+prod.coverage+' · 免赔：'+prod.deductible+' · 等待期：'+prod.waitingDays+'天';
  document.getElementById('ac-dropdown').classList.remove('show');
  document.getElementById('pf-premium').focus();
}

// ============================================================
//  截图上传（预留OCR接口）
// ============================================================
var screenshotData=null;

function handleScreenshot(input){
  var file=input.files[0]; if(!file)return;
  if(file.size>10*1024*1024){alert('文件大小不能超过10MB'); input.value=''; return;}

  var reader=new FileReader();
  reader.onload=function(e){
    screenshotData=e.target.result;
    var preview=document.getElementById('upload-preview');
    var hint=document.getElementById('upload-hint');
    var area=document.getElementById('upload-area');

    if(file.type.indexOf('image')>-1){
      preview.src=screenshotData; preview.style.display='block'; hint.style.display='none';
      area.classList.add('has-img');
      // OCR预留
      var ocrStatus=document.getElementById('ocr-status');
      ocrStatus.style.display='block'; ocrStatus.textContent='💡 图片已存储 · OCR自动识别功能即将上线';
      setTimeout(function(){ocrStatus.style.display='none';},3000);
    }else{
      hint.innerHTML='📄 '+file.name+'<br><span style="font-size:10px">PDF已存储，暂不支持预览</span>';
      area.classList.add('has-img');
    }
    input.value='';
  };
  reader.readAsDataURL(file);
}
