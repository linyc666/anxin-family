<title>家庭保险管家</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#0a0e17;color:#e2e8f0;line-height:1.6;min-height:100vh}
header{background:linear-gradient(135deg,#141923,#1a2332);padding:14px 12px;border-bottom:1px solid #1e293b;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
header h1{font-size:18px;color:#d4a853}
header .actions{display:flex;gap:4px;flex-wrap:wrap}
.btn{padding:7px 14px;border-radius:20px;border:1px solid #2a3344;background:#1a2332;color:#e2e8f0;font-size:13px;cursor:pointer;transition:.2s;white-space:nowrap;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.btn:active{opacity:.7}
.btn-gold{background:#d4a853;color:#0a0e17;border-color:#d4a853;font-weight:600}
.btn-red{background:rgba(239,68,68,.15);border-color:#ef4444;color:#f87171}
.btn-blue{background:rgba(59,130,246,.15);border-color:#3b82f6;color:#93c5fd}
.btn-sm{padding:4px 10px;font-size:11px}
nav{display:flex;gap:4px;padding:8px 12px;overflow-x:auto;background:#0f131c;border-bottom:1px solid #1e293b;position:sticky;top:0;z-index:50;-webkit-overflow-scrolling:touch}
nav a{color:#94a3b8;text-decoration:none;font-size:12px;white-space:nowrap;padding:5px 10px;border-radius:16px;background:#141923;border:1px solid #1e293b;flex-shrink:0}
nav a:hover,nav a.active{color:#d4a853;border-color:#d4a853;background:#1a2332}
section{padding:14px;display:none}
section.active{display:block}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:linear-gradient(145deg,#141923,#1a2332);border-radius:16px;padding:14px;text-align:center;border:1px solid #1e293b}
.stat-card .num{font-size:26px;font-weight:700;color:#d4a853;display:block}
.stat-card .label{font-size:11px;color:#94a3b8;margin-top:4px}
.stat-card.alert{border-color:#ef4444}
.tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.tag-red{background:rgba(239,68,68,.2);color:#f87171}
.tag-orange{background:rgba(245,158,11,.2);color:#fbbf24}
.tag-yellow{background:rgba(234,179,8,.2);color:#facc15}
.tag-green{background:rgba(16,185,129,.2);color:#34d399}
.tag-blue{background:rgba(59,130,246,.2);color:#93c5fd}
.member-card{background:#141923;border-radius:16px;padding:16px;margin-bottom:14px;border:1px solid #1e293b}
.member-card .mc-header{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.member-card .mc-name{font-size:17px;font-weight:700;color:#f1f5f9}
.member-card .mc-info{font-size:12px;color:#94a3b8}
.member-card .mc-premium{font-size:20px;font-weight:700;color:#d4a853;margin-left:auto}
.member-card .mc-actions{display:flex;gap:4px;flex-wrap:wrap}
.policy-card{background:#1a2332;border-radius:12px;padding:12px;margin-bottom:6px;border:1px solid #2a3344}
.policy-card .pc-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.policy-card .pc-title{font-weight:700;font-size:13px;color:#f1f5f9}
.policy-card .pc-company{font-size:11px;color:#64748b}
.policy-card .pc-premium{font-size:17px;font-weight:700;color:#d4a853;text-align:right}
.policy-card .pc-detail{font-size:12px;color:#94a3b8;margin-top:4px;line-height:1.6}
.policy-card .pc-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.policy-tag{font-size:10px;padding:2px 7px;border-radius:8px;background:rgba(30,41,59,.8);border:1px solid #2a3344;color:#94a3b8}
.policy-tag.green{color:#34d399;border-color:rgba(16,185,129,.3)}
.policy-tag.orange{color:#fbbf24;border-color:rgba(245,158,11,.3)}
.policy-tag.red{color:#f87171;border-color:rgba(239,68,68,.3)}
.policy-tag.blue{color:#93c5fd;border-color:rgba(59,130,246,.3)}
.gap-item{background:#1a2332;border-radius:12px;padding:12px;margin-bottom:8px;border-left:3px solid #ef4444}
.gap-item.p1{border-left-color:#f59e0b}
.gap-item.p2{border-left-color:#eab308}
.gap-item .gap-title{font-weight:700;font-size:13px;color:#f1f5f9}
.gap-item .gap-desc{font-size:12px;color:#94a3b8;margin-top:4px}
.gap-item .gap-suggest{font-size:12px;color:#d4a853;margin-top:4px}
.date-bar{display:flex;justify-content:space-between;font-size:11px;color:#64748b;margin-top:6px;padding-top:6px;border-top:1px solid #1e293b;flex-wrap:wrap;gap:4px}
h2{font-size:17px;color:#d4a853;margin-bottom:14px;padding-bottom:6px;border-bottom:1px solid #1e293b}
table{width:100%;border-collapse:collapse;font-size:12px;margin:10px 0}
th{text-align:left;padding:8px 6px;color:#94a3b8;font-weight:500;border-bottom:1px solid #1e293b;font-size:11px}
td{padding:8px 6px;border-bottom:1px solid #1a2332}
.note{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:10px;margin:8px 0;font-size:12px;color:#f87171}
.note-info{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:10px;padding:10px;margin:8px 0;font-size:12px;color:#93c5fd}
.empty-state{text-align:center;padding:40px 12px;color:#64748b}
.empty-state .icon{font-size:40px;margin-bottom:10px}
.empty-state p{font-size:13px;margin-bottom:12px}
footer{text-align:center;padding:20px;color:#475569;font-size:11px;border-top:1px solid #1e293b;margin-top:24px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:12px}
.modal{background:#141923;border:1px solid #2a3344;border-radius:16px;padding:18px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal h3{color:#d4a853;margin-bottom:14px;font-size:15px}
.form-group{margin-bottom:10px}
.form-group label{display:block;font-size:11px;color:#94a3b8;margin-bottom:3px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 10px;border-radius:10px;border:1px solid #2a3344;background:#1a2332;color:#e2e8f0;font-size:14px;font-family:inherit}
.form-group textarea{min-height:50px;resize:vertical}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#d4a853}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.policy-actions{display:flex;gap:2px}
.demo-banner{background:rgba(212,168,83,.1);border:1px solid rgba(212,168,83,.3);border-radius:10px;padding:10px 12px;margin-bottom:14px;font-size:12px;color:#d4a853;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.badge{font-size:10px;background:#ef4444;color:#fff;border-radius:8px;padding:1px 5px;margin-left:2px;display:inline-block;min-width:14px;text-align:center}
#back-to-top{position:fixed;bottom:20px;right:16px;width:40px;height:40px;border-radius:50%;background:#d4a853;color:#0a0e17;border:none;font-size:18px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.5);z-index:150;display:none;align-items:center;justify-content:center}
#back-to-top.visible{display:flex}
@media(max-width:480px){
  header h1{font-size:16px}
  .btn{padding:5px 10px;font-size:12px}
  nav{padding:6px 8px;gap:3px}
  nav a{font-size:11px;padding:4px 7px}
  section{padding:10px}
  .grid4{grid-template-columns:1fr 1fr}
  .stat-card{padding:10px}
  .stat-card .num{font-size:22px}
  .form-row{grid-template-columns:1fr}
  .member-card{padding:12px}
  .member-card .mc-header{flex-direction:column}
}
</style>
</head>

<header>

  <div class="actions">

    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(this)">

var STORAGE_KEY = 'fam_insurance_v1';

var storageOK = true;

try {
  var testKey = '__test__';
  localStorage.setItem(testKey, '1');
  localStorage.removeItem(testKey);
} catch(e) { storageOK = false; }

function loadData() {
  if (!storageOK) return clone(getFullDemoData());
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { var d = JSON.parse(raw); if (d.members && d.policies) return d; }
  } catch(e) {}
  return clone(getFullDemoData());
}
function saveData() {
  if (!storageOK) return;
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(FAMILY)); } catch(e) {}
}
function clone(obj) { return JSON.parse(JSON.stringify(obj)); }

  { id:'no_insurance', check:function(m,ps){ return !m.医保||m.医保==='无'||m.医保==='无医保'||m.医保.indexOf('零医保')>-1||m.医保===''; },
    title:'无社会医保', desc:'最基础的保障缺失。无医保时百万医疗保费翻倍且报销降至60%，惠民保无法投保。', priority:'p0', suggest:'立即办理城乡居民医保（¥350/年）或灵活就业医保。这是所有商业保险的基础，务必最优先处理。' },
  { id:'age_54_medical', check:function(m,ps){ return m.age>=54&&m.age<=55&&ps.filter(function(p){ return p.type==='百万医疗'; }).length===0; },
    title:'54-55岁无百万医疗——最后免体检窗口', desc:'超55岁投保百万医疗需体检，任何异常都可能导致拒保或除外。', priority:'p0', suggest:'立即配置太保B款百万医疗（20年保证续保），这是最后的窗口期。即使有小毛病也可能通过智能核保。' }
];

function detectGaps(member, policies) {
  var gaps = [];
  GAP_RULES.forEach(function(rule) {
    if (rule.check(member, policies)) gaps.push({ id:rule.id, title:rule.title, desc:rule.desc, priority:rule.priority, suggest:rule.suggest });
  });
  return gaps;
}

function getPriorityLabel(p) { return p==='p0'?'🔴 P0':(p==='p1'?'🟠 P1':(p==='p2'?'🟡 P2':'🟢 OK')); }

function genId() { return 'id_'+Date.now()+'_'+Math.random().toString(36).substr(2,6); }
function getMember(id) { return FAMILY.members.find(function(m){ return m.id===id; }); }
function getPolicies(memberId) { return FAMILY.policies.filter(function(p){ return p.memberId===memberId; }); }
function fmt(v) { return v||'-'; }
function tagCls(text) {
  if (!text) return '';
  if (text.indexOf('终身')>-1||text.indexOf('20年')>-1) return 'green';
  if (text.indexOf('6年')>-1) return 'orange';
  if (text.indexOf('1年')>-1||text.indexOf('不保证')>-1) return 'red';
  return '';
}

function renderAll() {
  renderNav();

function renderNav() {
  var nav = document.getElementById('main-nav');
  nav.innerHTML = '';
  ['概览','成员保单','缺口诊断','续保追踪','保费汇总'].forEach(function(label, i){
    var ids = ['sec-overview','sec-members','sec-gaps','sec-renewal','sec-summary'];
    var a = document.createElement('a');
    a.href = '#'+ids[i];
    a.textContent = label;
    if (i>=2) { var b = document.createElement('span'); b.className='badge'; b.id='badge-'+ids[i]; b.textContent='0'; a.appendChild(b); }
    a.onclick = function(e){ e.preventDefault(); switchSection(ids[i]); };
    if (i===0) a.classList.add('active');
    nav.appendChild(a);
  });
}

function switchSection(id) {
  document.querySelectorAll('section').forEach(function(s){ s.classList.remove('active'); });
  var sec = document.getElementById(id);
  if (sec) sec.classList.add('active');
  document.querySelectorAll('nav a').forEach(function(a){ a.classList.remove('active'); });
  var link = document.querySelector('nav a[href="#'+id+'"]');
  if (link) link.classList.add('active');
  window.scrollTo({ top:(sec?sec.offsetTop-100:0), behavior:'smooth' });
}

    '<div class="stat-card'+(p0Count>0?' alert':'')+'"><span class="num">'+allGaps+'</span><span class="label">项风险缺口</span></div>'+

                 p0Gaps.length>0?'<span class="tag tag-red">🔴 '+p0Gaps.length+'/'+gaps.length+'项缺口</span>':

      gapTag+'<span class="mc-premium">¥'+totalPrem.toLocaleString()+'/年</span>'+
      '<div class="mc-actions">'+
        '<button class="btn btn-gold btn-sm" onclick="openPolicyForm(\''+m.id+'\')">+保单</button>'+
        '<button class="btn btn-sm" onclick="openMemberForm(\''+m.id+'\')">编辑</button>'+

    if (ps.length===0) {
      h += '<div style="color:#64748b;font-size:12px;padding:6px 0">暂无保单 — 点击「+保单」添加</div>';
    } else {
      ps.forEach(function(p){
        var tags = p.tags?p.tags.split(',').map(function(t){ return t.trim(); }).filter(Boolean):[];
        var expDate = p.expiry&&p.expiry!=='终身'?new Date(p.expiry):null;
        var daysLeft = expDate?Math.ceil((expDate-Date.now())/86400000):null;
        var expSoon = daysLeft!==null&&daysLeft<90;
        var expired = daysLeft!==null&&daysLeft<0;

        h += '<div class="policy-card"'+(expSoon||expired?' style="border-color:'+(expired?'#ef4444':'rgba(245,158,11,.4)')+'"':'')+'>'+
          '<div class="pc-header"><div><div class="pc-title">'+p.name+'</div><div class="pc-company">'+p.company+' · '+p.type+'</div></div>'+
          '<div class="pc-premium">¥'+parseInt(p.premium).toLocaleString()+'<span style="font-size:11px;color:#64748b;font-weight:400">/年</span></div></div>';
        if (tags.length) {
          h += '<div class="pc-tags">';
          tags.forEach(function(t){ h += '<span class="policy-tag'+(tagCls(t)?' '+tagCls(t):'')+'">'+t+'</span>'; });
          h += '</div>';

        h += '<div class="pc-detail">保额：'+fmt(p.coverage)+' · 续保：'+fmt(p.guaranteedYears)+(p.detail?'<br>'+p.detail:'')+'</div>';

      });
    }
    h += '</div>';
  });
  sec.innerHTML = h;
}

function renderGaps() {
  var sec = document.getElementById('sec-gaps');
  var allGaps = [];
  FAMILY.members.forEach(function(m){
    detectGaps(m, getPolicies(m.id)).forEach(function(g){ g.memberName=m.name; allGaps.push(g); });
  });
  if (allGaps.length===0) {
    sec.innerHTML = '<h2>风险缺口诊断</h2><div class="empty-state"><div class="icon">✅</div><p>恭喜！未检测到明显保障缺口</p></div>';
    return;
  }
  allGaps.sort(function(a,b){ var o={p0:0,p1:1,p2:2}; return (o[a.priority]||0)-(o[b.priority]||0); });

  var h = '<h2>风险缺口诊断</h2>';
  h += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">'+
    '<span class="tag tag-red">🔴 P0：'+allGaps.filter(function(g){ return g.priority==='p0'; }).length+'项</span>'+
    '<span class="tag tag-orange">🟠 P1：'+allGaps.filter(function(g){ return g.priority==='p1'; }).length+'项</span>'+
    '<span class="tag tag-yellow">🟡 P2：'+allGaps.filter(function(g){ return g.priority==='p2'; }).length+'项</span>'+
    '</div>';

  allGaps.forEach(function(g){
    h += '<div class="gap-item '+g.priority+'">'+
      '<div class="gap-title">'+getPriorityLabel(g.priority)+' — '+g.memberName+'：'+g.title+'</div>'+
      '<div class="gap-desc">'+g.desc+'</div>'+
      '<div class="gap-suggest">💡 '+g.suggest+'</div></div>';
  });
  sec.innerHTML = h;
}

function renderRenewal() {
  var sec = document.getElementById('sec-renewal');
  var renewals = [];
  FAMILY.policies.forEach(function(p){
    if (!p.expiry||p.expiry==='终身') return;
    var daysLeft = Math.ceil((new Date(p.expiry)-Date.now())/86400000);
    var member = getMember(p.memberId);
    renewals.push({ policy:p, member:member, daysLeft:daysLeft });
  });
  renewals.sort(function(a,b){ return a.daysLeft-b.daysLeft; });

  if (renewals.length===0) {
    sec.innerHTML = '<h2>续保追踪</h2><div class="empty-state"><div class="icon">📅</div><p>暂无需追踪的续保</p></div>';
    return;
  }

  var h = '<h2>续保追踪</h2>';
  h += '<div class="note-info" style="margin-bottom:14px"><strong>⚠️ 保单按到期日排序。</strong>建议到期前30-60天续保或置换更优产品。1年期不保证续保的产品尤其需要提前关注。</div>';
  h += '<table><tr><th>到期日</th><th>剩余</th><th>成员</th><th>保单</th><th>类型</th><th>年费</th><th>续保</th></tr>';

  renewals.forEach(function(r){
    var cls = r.daysLeft<0?'style="color:#ef4444"':r.daysLeft<60?'style="color:#f59e0b"':'';
    var txt = r.daysLeft<0?'🔴 已过期':r.daysLeft<30?'🔴 '+r.daysLeft+'天':r.daysLeft<90?'🟡 '+r.daysLeft+'天':r.daysLeft+'天';
    h += '<tr><td>'+r.policy.expiry+'</td><td '+cls+'>'+txt+'</td>'+
      '<td>'+(r.member?r.member.name:'?')+'</td><td>'+r.policy.name+'</td>'+
      '<td>'+r.policy.type+'</td><td>¥'+parseInt(r.policy.premium).toLocaleString()+'</td>'+
      '<td>'+fmt(r.policy.guaranteedYears)+'</td></tr>';
  });
  h += '</table>';
  sec.innerHTML = h;
}

function renderSummary() {
  var sec = document.getElementById('sec-summary');
  var total = FAMILY.policies.reduce(function(s,p){ return s+(parseInt(p.premium)||0); },0);
  var h = '<h2>保费汇总</h2><table><tr><th>成员</th><th>保单数</th><th>年保费</th></tr>';

  sec.innerHTML = h;
}

function updateBadges() {
  var allGaps = 0, renewalCount = 0;
  FAMILY.members.forEach(function(m){ allGaps+=detectGaps(m,getPolicies(m.id)).length; });
  FAMILY.policies.forEach(function(p){
    if (p.expiry&&p.expiry!=='终身'&&new Date(p.expiry)<new Date(Date.now()+90*86400000)) renewalCount++;
  });
  var bg = document.getElementById('badge-sec-gaps'); if (bg) bg.textContent = allGaps;
  var br = document.getElementById('badge-sec-renewal'); if (br) br.textContent = renewalCount;
}

function saveMember() {
  var obj = {
    name: document.getElementById('mf-name').value.trim(),
    age: parseInt(document.getElementById('mf-age').value)||0,
    role: document.getElementById('mf-role').value,
    医保: document.getElementById('mf-insurance').value,
    负债: document.getElementById('mf-debt').value.trim(),
    notes: document.getElementById('mf-notes').value.trim()
  };
  if (!obj.name||!obj.age) { alert('请填写姓名和年龄'); return; }
  if (editingMemberId) {
    var m = getMember(editingMemberId);
    if (!m) return;
    Object.keys(obj).forEach(function(k){ m[k]=obj[k]; });
  } else {
    obj.id = genId();
    FAMILY.members.push(obj);
  }
  isDemo = false; saveData(); closeModal(); renderAll();
}

function deleteMember(id) {
  if (!confirm('确定删除该成员及其所有保单？此操作不可恢复。')) return;
  FAMILY.members = FAMILY.members.filter(function(m){ return m.id!==id; });
  FAMILY.policies = FAMILY.policies.filter(function(p){ return p.memberId!==id; });
  isDemo = false; saveData(); renderAll();
}

    '<div class="form-row"><div class="form-group"><label>生效日期</label><input id="pf-effective" type="date" value="'+(p&&p.effective?p.effective:'')+'"></div>'+
    '<div class="form-group"><label>到期日期</label><input id="pf-expiry" type="date" value="'+(p&&p.expiry&&p.expiry!=='终身'?p.expiry:'')+'"><div style="font-size:10px;color:#64748b;margin-top:2px">终身保证续保的留空即可</div></div></div>'+
    '<div class="form-group"><label>标签（逗号分隔）</label><input id="pf-tags" value="'+(p&&p.tags?escHtml(p.tags):'')+'" placeholder="如：含CAR-T,0免赔,20年保证"></div>'+
    '<div class="form-group"><label>保障详情</label><textarea id="pf-detail" placeholder="如：一般医疗200万·重疾400万·含质子重离子·免赔1万">'+(p&&p.detail?escHtml(p.detail):'')+'</textarea></div>'+
    '<div class="form-actions"><button class="btn" onclick="closeModal()">取消</button><button class="btn btn-gold" onclick="savePolicy()">保存</button></div>';
  showModal(h);
}

function savePolicy() {
  var obj = {
    memberId: editingPolicyMemberId,
    type: document.getElementById('pf-type').value,
    name: document.getElementById('pf-name').value.trim(),
    company: document.getElementById('pf-company').value.trim(),
    premium: parseInt(document.getElementById('pf-premium').value)||0,
    coverage: document.getElementById('pf-coverage').value.trim(),
    guaranteedYears: document.getElementById('pf-guarantee').value,
    effective: document.getElementById('pf-effective').value,
    expiry: document.getElementById('pf-expiry').value||'终身',
    tags: document.getElementById('pf-tags').value.trim(),
    detail: document.getElementById('pf-detail').value.trim()
  };
  if (!obj.name||!obj.company||!obj.type||!obj.premium) { alert('请填写保单名称、公司、类型和保费'); return; }
  if (editingPolicyId) {
    var existing = FAMILY.policies.find(function(p){ return p.id===editingPolicyId; });
    if (!existing) return;
    Object.keys(obj).forEach(function(k){ existing[k]=obj[k]; });
  } else {
    obj.id = genId();
    FAMILY.policies.push(obj);
  }
  isDemo = false; saveData(); closeModal(); renderAll();
}

function deletePolicy(id) {
  if (!confirm('确定删除该保单？')) return;
  FAMILY.policies = FAMILY.policies.filter(function(p){ return p.id!==id; });
  isDemo = false; saveData(); renderAll();
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ============================================================
//  导入导出
// ============================================================
function exportData() {
  var blob = new Blob([JSON.stringify(FAMILY,null,2)],{type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href=url; a.download='家庭保险数据_'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

function importData(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    try {
      var data = JSON.parse(e.target.result);
      if (!data.members||!Array.isArray(data.members)||!data.policies||!Array.isArray(data.policies)) throw new Error('数据格式不正确');
      if (!confirm('将导入 '+data.members.length+' 位成员和 '+data.policies.length+' 份保单。会覆盖当前数据，确认？')) return;
      FAMILY = data; isDemo = false; saveData(); renderAll();
    } catch(err) { alert('导入失败：'+err.message); }
  };
  reader.readAsText(file);
  input.value = '';
}

function resetAll() {
  if (!confirm('确定清空所有数据？建议先导出备份。')) return;
  FAMILY = { members:[], policies:[] }; isDemo = false; saveData(); renderAll();
}

function loadDemo() {
  FAMILY = clone(getFullDemoData()); isDemo = true; saveData(); renderAll();
}

// ============================================================
//  Modal
// ============================================================
function showModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal').style.display = 'flex';
}
function closeModal() {
  document.getElementById('modal').style.display = 'none';
  editingMemberId=null; editingPolicyId=null; editingPolicyMemberId=null;
}

// ============================================================
//  启动
// ============================================================
try {
  FAMILY = loadData();
  if (FAMILY.members.length===10 && FAMILY.members[0]&&FAMILY.members[0].name.indexOf('林永聪')>-1) isDemo = true;
} catch(e) { FAMILY = clone(getFullDemoData()); isDemo = true; }

renderAll();

var btt = document.getElementById('back-to-top');
window.addEventListener('scroll', function(){ if(window.scrollY>400)btt.classList.add('visible'); else btt.classList.remove('visible'); });
</script>
</body>
</html>
