header{background:linear-gradient(135deg,#141923,#1a2332);padding:20px 16px;border-bottom:1px solid #1e293b}
header h1{font-size:22px;color:#d4a853;margin-bottom:4px}
header .sub{font-size:13px;color:#94a3b8}
nav{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;background:#0f131c;border-bottom:1px solid #1e293b}
nav a{color:#94a3b8;text-decoration:none;font-size:12px;white-space:nowrap;padding:5px 10px;border-radius:16px;background:#141923;border:1px solid #1e293b;transition:.2s;flex-shrink:0}
nav a:hover,nav a.active{color:#d4a853;border-color:#d4a853;background:#1a2332}
section{padding:16px}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:linear-gradient(145deg,#141923,#1a2332);border-radius:16px;padding:16px;text-align:center;border:1px solid #1e293b}

.tag{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600}
.tag-red{background:rgba(239,68,68,.2);color:#f87171}
.tag-orange{background:rgba(245,158,11,.2);color:#fbbf24}
.tag-yellow{background:rgba(234,179,8,.2);color:#facc15}
.tag-green{background:rgba(16,185,129,.2);color:#34d399}
.tag-blue{background:rgba(59,130,246,.2);color:#93c5fd}
.member-card{background:#141923;border-radius:16px;padding:20px;margin-bottom:20px;border:1px solid #1e293b}
.member-card .header{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.member-card .name{font-size:18px;font-weight:700;color:#f1f5f9}
.member-card .info{font-size:13px;color:#94a3b8}
.member-card .premium{font-size:22px;font-weight:700;color:#d4a853;margin-left:auto}
.policy-card{background:#1a2332;border-radius:14px;padding:16px;margin-bottom:10px;border:1px solid #2a3344}
.policy-card .pc-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.policy-card .pc-title{font-weight:700;font-size:15px;color:#f1f5f9}
.policy-card .pc-company{font-size:12px;color:#64748b}
.policy-card .pc-premium{font-size:20px;font-weight:700;color:#d4a853;text-align:right}
.policy-card .pc-premium .yr{font-size:11px;color:#64748b;font-weight:400}
.policy-details{list-style:none;padding:0}
.policy-details li{font-size:13px;padding:4px 0 4px 18px;color:#cbd5e1;position:relative}
.policy-details li::before{content:'•';position:absolute;left:0;color:#d4a853}
.policy-details li.hl::before{content:'⭐';color:#f59e0b}
.policy-details li.warn::before{content:'⚠️';color:#ef4444}
.policy-assessment{font-size:12px;color:#94a3b8;margin-top:8px;padding:8px 12px;background:rgba(212,168,83,.06);border-radius:8px;line-height:1.7}
.policy-assessment strong{color:#d4a853}
.policy-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.policy-tag{font-size:11px;padding:3px 8px;border-radius:8px;background:rgba(30,41,59,.8);border:1px solid #2a3344;color:#94a3b8}
.policy-tag.green{color:#34d399;border-color:rgba(16,185,129,.3)}
.policy-tag.orange{color:#fbbf24;border-color:rgba(245,158,11,.3)}
.policy-tag.red{color:#f87171;border-color:rgba(239,68,68,.3)}
.date-bar{display:flex;justify-content:space-between;font-size:12px;color:#64748b;margin-top:10px;padding-top:8px;border-top:1px solid #1e293b}
.gap-box{background:#141923;border-radius:12px;padding:16px;margin-top:14px;border:1px solid #2a3344}
.gap-box h4{color:#d4a853;font-size:14px;margin-bottom:8px}
.gap-box p{font-size:13px;color:#94a3b8;margin-bottom:8px}
.rec-card{background:#1a2332;border-radius:12px;padding:14px;border:1px solid #2a3344;margin-bottom:8px;transition:border-color .2s}
.rec-card:hover{border-color:rgba(212,168,83,.3)}
.rec-card .rc-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:6px}
.rec-card .rc-name{font-weight:700;font-size:14px;color:#f1f5f9}
.rec-card .rc-company{font-size:11px;color:#64748b}
.rec-card .rc-price{font-size:19px;font-weight:700;color:#d4a853;text-align:right}
.rec-card .rc-price .yr{font-size:11px;color:#64748b;font-weight:400}
.rec-card .rc-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.rec-card .rc-tags .tag{font-size:10px}
.rec-toggle-btn{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#64748b;cursor:pointer;padding:2px 0;margin-top:4px;user-select:none;border:none;background:none}
.rec-toggle-btn:hover{color:#d4a853}
.rec-toggle-btn::after{content:' ▸';font-size:10px;transition:transform .2s}
.rec-toggle-btn.expanded::after{content:' ▾'}
.rec-card.collapsed .rec-detail-wrap{display:none}
.rec-detail-wrap{margin-top:10px;padding-top:10px;border-top:1px solid #1e293b}
.rec-detail-grid{display:grid;grid-template-columns:1fr;gap:4px}
@media(min-width:500px){.rec-detail-grid{grid-template-columns:1fr 1fr}}
.rec-dim{display:flex;gap:4px;font-size:11px;line-height:1.6}
.rec-dim .dim-label{color:#64748b;white-space:nowrap;min-width:42px;font-size:10px}
.rec-dim .dim-val{color:#cbd5e1}
.rec-dim .dim-val.good{color:#34d399}
.rec-dim .dim-val.warn{color:#fbbf24}
.rec-assessment{font-size:11px;color:#94a3b8;margin-top:8px;padding:8px 10px;background:rgba(212,168,83,.05);border-radius:8px;line-height:1.6}
.rec-assessment strong{color:#d4a853}
.rec-rec{background:rgba(212,168,83,.04);border:1px solid rgba(212,168,83,.15);border-radius:8px;padding:6px 10px;margin-top:8px;font-size:11px;color:#d4a853}
.insure-note{background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.15);border-radius:8px;padding:8px 12px;margin-top:8px;font-size:11px;color:#93c5fd;line-height:1.6}
.insure-note strong{color:#60a5fa}
.insure-note .bad{color:#f87171}
h2{font-size:18px;color:#d4a853;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #1e293b}
.note{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:12px;margin:12px 0;font-size:13px;color:#f87171}
.note-info{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:10px;padding:12px;margin:12px 0;font-size:13px;color:#93c5fd}
.summary-bar{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0}
.timeline{padding-left:20px;border-left:2px solid #2a3344}
.tl-item{margin-bottom:16px;position:relative;padding:4px 8px}
.tl-item::before{content:'';position:absolute;left:-26px;top:8px;width:10px;height:10px;border-radius:50%;background:#d4a853}
.tl-item.urgent::before{background:#ef4444;box-shadow:0 0 8px rgba(239,68,68,.5)}
.tl-item.warn::before{background:#f59e0b;box-shadow:0 0 8px rgba(245,158,11,.5)}
.tl-item .tl-date{font-size:13px;color:#94a3b8}
.tl-item .tl-event{font-size:14px;color:#f1f5f9;margin-top:2px}
table{width:100%;border-collapse:collapse;font-size:13px;margin:12px 0}
th{text-align:left;padding:10px 8px;color:#94a3b8;font-weight:500;border-bottom:1px solid #1e293b;font-size:12px}
td{padding:10px 8px;border-bottom:1px solid #1a2332}
tr:last-child td{border-bottom:none}
footer{text-align:center;padding:24px;color:#475569;font-size:12px;border-top:1px solid #1e293b;margin-top:32px}
.coverage-bar{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid #1e293b;font-size:12px}
.cov-ok{color:#34d399;background:rgba(16,185,129,.1);padding:2px 8px;border-radius:10px;white-space:nowrap}
.cov-warn{color:#fbbf24;background:rgba(245,158,11,.1);padding:2px 8px;border-radius:10px;white-space:nowrap}
.cov-bad{color:#f87171;background:rgba(239,68,68,.1);padding:2px 8px;border-radius:10px;white-space:nowrap}

.mn-btn:hover,.mn-btn.active{color:#d4a853;border-color:#d4a853;background:#1a2332}

.rec-compare-table th{font-size:10px;padding:6px 4px;text-align:center;background:#141923}
.rec-compare-table td{font-size:11px;padding:6px 4px;text-align:center}
.rec-compare-table td:first-child{text-align:left;color:#f1f5f9;font-weight:500}
.rec-compare-table .winner{color:#34d399;font-weight:600}

.prop-card .prop-name{font-weight:700;font-size:15px;color:#f1f5f9}
.prop-card .prop-addr{font-size:12px;color:#64748b}

.p1{background:rgba(245,158,11,.08);border-left:3px solid #f59e0b;border-radius:0 12px 12px 0}
.p2{background:rgba(234,179,8,.06);border-left:3px solid #eab308;border-radius:0 12px 12px 0}
.ok{background:rgba(16,185,129,.06);border-left:3px solid #10b981;border-radius:0 12px 12px 0}

.policy-card.collapsed .policy-assessment,
.policy-card.collapsed .policy-tags,
.policy-card.collapsed .date-bar{display:none}
.policy-toggle-btn{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#64748b;cursor:pointer;padding:2px 0;margin-top:4px;user-select:none;border:none;background:none;width:100%}
.policy-toggle-btn:hover{color:#d4a853}
.policy-toggle-btn::after{content:' ▸';font-size:10px;transition:transform .2s}
.policy-toggle-btn.expanded::after{content:' ▾'}

  nav a{font-size:11px;padding:4px 8px}
  #member-nav{padding:8px 10px;gap:4px}
  .mn-btn{font-size:11px;padding:4px 8px}
  section{padding:12px}
  h2{font-size:16px}
  .stat-card{padding:12px}
  .stat-card .num{font-size:22px}
  .policy-card{padding:12px}
  .policy-card .pc-title{font-size:13px}
  .policy-card .pc-premium{font-size:16px}
  .policy-details li{font-size:11px}
  .member-card .header{flex-direction:column;align-items:flex-start}
  .member-card .premium{align-self:flex-end}
  .grid4{grid-template-columns:repeat(2,1fr)}
  table{font-size:12px}
  th,td{padding:8px 4px}
  .rec-detail-grid{grid-template-columns:1fr}
  .policy-assessment{font-size:11px}
}
@media print{
  body{background:#fff;color:#000}
  .member-card,.policy-card,.rec-card,.gap-box{break-inside:avoid;border:1px solid #ccc;background:#fff}
  nav,#member-nav,footer{display:none}
  .hidden{display:block !important}
  .policy-card.collapsed .policy-details,
  .policy-card.collapsed .policy-assessment,
  .policy-card.collapsed .policy-tags{display:block}
}
#back-to-top{position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:50%;background:#d4a853;color:#0a0e17;border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.4);z-index:200;display:none;align-items:center;justify-content:center;transition:opacity .3s}
#back-to-top.visible{display:flex}
</style>

// ============================================================
//  渲染引擎 —— 下面的代码不需要修改
// ============================================================
function renderTag(cls, text) { return '<span class="tag '+cls+'">'+text+'</span>'; }

function memberStats(m) { return { members:1, policies:m.policies?m.policies.length:0, premium:m.premium, urgent:m.riskClass==='p0'?2:(m.riskClass==='p1'?1:0) }; }

function renderPolicyCard(p) {
  var h = '<div class="policy-card"'+(p.borderColor?' style="border-color:'+p.borderColor+'"':'')+'>';
  h += '<div class="pc-header"><div><div class="pc-title">'+p.name+'</div><div class="pc-company">'+p.company+'</div></div>';
  h += '<div class="pc-premium">¥'+p.premium.toLocaleString()+'<span class="yr">'+(p.premiumNote||'/年')+'</span></div></div>';
  if (p.tags && p.tags.length) { h += '<div class="policy-tags">'; p.tags.forEach(function(t){ h += '<span class="policy-tag'+(t.cls?' '+t.cls:'')+'">'+t.text+'</span>'; }); h += '</div>'; }
  if (p.details && p.details.length) {
    h += '<ul class="policy-details">';
    p.details.forEach(function(d){ var t=typeof d==='object'?d.text:d, c=typeof d==='object'&&d.cls?' class="'+d.cls+'"':''; h += '<li'+c+'>'+t+'</li>'; });
    h += '</ul>';
  }
  if (p.assessment) h += '<div class="policy-assessment">'+p.assessment+'</div>';
  if (p.insureNote) h += '<div class="insure-note">'+p.insureNote+'</div>';
  if (p.effective) {
    var es = p.expiryStyle?' style="'+p.expiryStyle+'"':'';
    h += '<div class="date-bar"><span>生效 '+p.effective+'</span><span'+es+'>到期 '+p.expiry+'</span></div>';
  }
  return h+'</div>';
}

function renderRecCard(rec) {
  var h = '<div class="rec-card">';
  h += '<div class="rc-header"><div><div class="rc-name">'+(rec.rank?rec.rank+' ':'')+rec.name+'</div><div class="rc-company">'+rec.company+'</div></div>';
  h += '<div class="rc-price">'+rec.price+(rec.priceNote?'<span class="yr">'+rec.priceNote+'</span>':'')+'</div></div>';
  if (rec.tags && rec.tags.length) { h += '<div class="rc-tags">'; rec.tags.forEach(function(t){ h += renderTag(t.cls, t.text); }); h += '</div>'; }
  h += '<div class="rec-detail-wrap">';
  if (rec.dims && rec.dims.length) {
    h += '<div class="rec-detail-grid">';
    rec.dims.forEach(function(d){ h += '<div class="rec-dim"><span class="dim-label">'+d.label+'</span><span class="dim-val'+(d.cls?' '+d.cls:'')+'">'+d.val+'</span></div>'; });
    h += '</div>';
  }
  if (rec.compareTable) {
    var t = rec.compareTable;
    h += '<table class="rec-compare-table"><tr>'; t.headers.forEach(function(hdr){ h += '<th>'+hdr+'</th>'; }); h += '</tr>';
    t.rows.forEach(function(row){ h += '<tr>'; row.forEach(function(c){ h += '<td'+(typeof c==='object'&&c.cls?' class="'+c.cls+'"':'')+'>'+(typeof c==='object'?c.text:c)+'</td>'; }); h += '</tr>'; });
    h += '</table>';
  }
  if (rec.rec) h += '<div class="rec-rec">'+rec.rec+'</div>';
  if (rec.assessment) h += '<div class="rec-assessment">'+rec.assessment+'</div>';
  if (rec.insureNote) h += '<div class="insure-note">'+rec.insureNote+'</div>';
  return h+'</div></div>';
}

function renderMemberCard(m) {
  var h = '<div class="member-card '+m.riskClass+'" data-member="'+m.id+'"'+(m.extraStyle?' style="'+m.extraStyle+'"':'')+'>';
  h += '<div class="header"><div><div class="name">'+m.name+'</div><div class="info">'+m.info+'</div></div>';
  h += '<span class="tag '+m.riskTagCls+'">'+m.riskLabel+'</span><span class="premium">¥'+m.premium.toLocaleString()+'/年</span></div>';
  if (m.coverage && m.coverage.length) { h += '<div class="coverage-bar">'; m.coverage.forEach(function(c){ h += '<span class="'+c.cls+'">'+c.text+'</span>'; }); h += '</div>'; }
  if (m.notes) m.notes.forEach(function(n){ h += '<div class="'+n.cls+'"'+(n.style?' style="'+n.style+'"':'')+'>'+n.text+'</div>'; });
  if (m.policies) m.policies.forEach(function(p){ h += renderPolicyCard(p); });
  if (m.specialTable) {
    h += '<table><tr>'; m.specialTable.headers.forEach(function(hdr){ h += '<th>'+hdr+'</th>'; }); h += '</tr>';
    m.specialTable.rows.forEach(function(row){
      h += '<tr>';
      row.forEach(function(cell){
        var a='', t='';
        if (typeof cell==='object') { if(cell.cls==='gold') a=' style="color:#d4a853;font-weight:600"'; else if(cell.cls==='bold') a=' style="font-weight:700"'; if(cell.colSpan) a+=' colspan="'+cell.colSpan+'"'; t=cell.text; }
        else t=cell;
        h += '<td'+a+'>'+t+'</td>';
      });
      h += '</tr>';
    });
    h += '</table>';
  }
  if (m.specialHTML) h += m.specialHTML;
  var g = m.gaps;
  if (g && g.recommendations) {
    h += '<div class="gap-box">';
    if (g.title) h += '<h4>'+g.title+'</h4>';
    if (g.desc) h += '<p>'+g.desc+'</p>';
    g.recommendations.forEach(function(rec){
      if (rec.skipDetail) {
        h += '<div class="rec-card"><div class="rc-header"><div><div class="rc-name">'+rec.name+'</div><div class="rc-company">'+rec.company+'</div></div>';
        h += '<div class="rc-price">'+rec.price+(rec.priceNote?'<span class="yr">'+rec.priceNote+'</span>':'')+'</div></div>';
        if (rec.tags && rec.tags.length) { h += '<div class="rc-tags">'; rec.tags.forEach(function(t){ h += renderTag(t.cls, t.text); }); h += '</div>'; }
        if (rec.dims && rec.dims.length) {
          h += '<div class="rec-detail-wrap"><div class="rec-detail-grid">';
          rec.dims.forEach(function(d){ h += '<div class="rec-dim"><span class="dim-label">'+d.label+'</span><span class="dim-val'+(d.cls?' '+d.cls:'')+'">'+d.val+'</span></div>'; });
          h += '</div>';
          if (rec.assessment) h += '<div class="rec-assessment">'+rec.assessment+'</div>';
          h += '</div>';
        }
        h += '</div>';
      } else { h += renderRecCard(rec); }
    });
    if (g.subTitle) { h += '<h4 style="margin-top:14px">'+g.subTitle+'</h4>'; g.subRecs.forEach(function(rec){ h += renderRecCard(rec); }); }
    if (g.insureNote) h += '<div class="insure-note">'+g.insureNote+'</div>';
    h += '</div>';
  }
  return h+'</div>';
}

function renderTable(headers, rows) {
  var h = '<table><tr>'; headers.forEach(function(hdr){ h += '<th>'+hdr+'</th>'; }); h += '</tr>';
  rows.forEach(function(row){
    var rs = '';
    row.forEach(function(cell){ if(typeof cell==='object'&&cell.cls==='total') rs=' style="font-weight:700;border-top:2px solid #d4a853"'; });
    h += '<tr'+rs+'>';
    row.forEach(function(cell){
      var s='', t='';
      if (typeof cell==='object') {
        if (cell.cls==='gold-now') s=' style="color:#d4a853;font-size:16px"';
        else if (cell.cls==='red-gap') s=' style="color:#f87171;font-size:16px"';
        else if (cell.cls==='gold-after') s=' style="color:#d4a853;font-size:16px"';
        else if (cell.cls==='gold') s=' style="color:#d4a853"';
        else if (cell.cls==='bold') s=' style="font-weight:700"';
        t=cell.text;
      } else t=cell;
      h += '<td'+s+'>'+t+'</td>';
    });
    h += '</tr>';
  });
  return h+'</table>';
}

      body:'<table><tr><th>现有1年期</th><th>风险</th><th>置换为</th><th>保费变化</th><th>收益</th></tr><tr><td><span class="tag tag-red">健康福重疾80万</span> ¥907·12月到期</td><td>患病→拒保</td><td><strong>完美人生8号 50万终身</strong>或超级玛丽16号</td><td>¥907→¥5,800 <span style="color:#f87171">+¥4,893</span></td><td>终身保证·费率锁定·30年累计省50%+</td></tr><tr><td><span class="tag tag-yellow">小蜜蜂6号 ¥298</span></td><td>低</td><td><strong>保持</strong></td><td>—</td><td>意外险1年期续保风险极低</td></tr></table>' },
    ya: { name:'林于雅 — 置换方案', tag:'<span class="tag tag-red">3份1年期·全部需关注</span>',
      body:'<table><tr><th>现有</th><th>风险</th><th>置换为</th><th>保费</th><th>理由</th></tr><tr><td><span class="tag tag-red">悠遥保 ¥412</span></td><td>1年不保证</td><td><strong>太保B款</strong> 20年保证</td><td>~¥380</td><td>质变升级·保费反降</td></tr><tr><td><span class="tag tag-yellow">骏业白领保 ¥388</span></td><td>保额低</td><td><strong>小蜜蜂6号 ¥298</strong></td><td>省¥90</td><td>保额3-5倍提升</td></tr></table>' },
    jia: { name:'林于嘉 — 置换方案', tag:'<span class="tag tag-red">核心风险：好医保1年不保证</span>',
      body:'<table><tr><th>现有</th><th>风险</th><th>置换为</th><th>保费</th></tr><tr><td><span class="tag tag-red">好医保 ¥403</span></td><td>1年不保证</td><td><strong>太保B款 ¥250</strong></td><td><span style="color:#10b981">省¥153</span></td></tr></table><div class="policy-assessment">又便宜又稳定，没有理由不换。5月25日生日前完成。</div>' }
  };
  D.swap.members.forEach(function(mid){ sc.innerHTML += '<div class="member-card"><div class="header"><div class="name">'+swapData[mid].name+'</div>'+swapData[mid].tag+'</div>'+swapData[mid].body+'</div>'; });

  // Gaps table
  var gc = document.getElementById('gaps-container'), gt = D.gapsTable;
  gc.innerHTML += renderTable(gt.headers, gt.rows.map(function(row){
    return row.map(function(cell, i){
      if (i===0 && typeof cell==='object') return cell;
      return cell;
    });
  }));
  // Fix gaps table row styling
  gc.innerHTML = '<table><tr>'; gt.headers.forEach(function(h){ gc.innerHTML += '<th>'+h+'</th>'; }); gc.innerHTML += '</tr>';
  gt.rows.forEach(function(row){
    var rc = row[0].cls==='special'?' style="border-top:2px solid #d4a853"':(row[0].cls&&row[0].cls!=='special'?' class="'+row[0].cls+'"':'');
    gc.innerHTML += '<tr'+rc+'>';
    row.forEach(function(cell){ gc.innerHTML += '<td>'+(typeof cell==='object'?cell.text:cell)+'</td>'; });
    gc.innerHTML += '</tr>';
  });
  gc.innerHTML += '</table>';

  // Renewal
  var rc = document.getElementById('renewal-container'), ren = D.renewal;
  rc.innerHTML = '<div class="note">'+ren.intro+'</div>'+renderTable(ren.headers, ren.rows);

  // Timeline
  var tc = document.getElementById('timeline-container');
  tc.innerHTML = '<div class="timeline">';
  D.timeline.forEach(function(item){ tc.innerHTML += '<div class="tl-item'+(item.cls?' '+item.cls:'')+'"><div class="tl-date">'+item.date+'</div><div class="tl-event">'+item.event+'</div></div>'; });
  tc.innerHTML += '</div>';

  // Summary
  var sumc = document.getElementById('summary-container'), sum = D.summary;
  sumc.innerHTML = '<h2>保费汇总</h2>'+renderTable(sum.personalHeaders, sum.personalRows);
  sumc.innerHTML += '<h2 style="margin-top:24px">🏠 财产险年费预估</h2>'+renderTable(sum.propertyHeaders, sum.propertyRows);
  sumc.innerHTML += '<h2 style="margin-top:24px">保险公司风控</h2>'+renderTable(sum.companyHeaders, sum.companyRows);

  // Footer
  document.getElementById('footer-text').innerHTML = '林家保险看板 v'+D.meta.version+' · 财产险板块含车险+房险 · 惠民保补全 · '+D.meta.date+'<br>🚗 欣车险：平安产险 交强¥855+商业¥4,306=¥5,161/年 · 三者300万✅ · 到期2026-10-22<br>🏠 汕尾瑞景豪庭143㎡ + 深圳安居悦桐湾 家财险推荐<br>数据源：5份PDF+11份截图+飞书多维表格 · 本报告仅供参考<br>🔴 P0立即处理 🟠 P1尽快配置 🟡 P2短期补充 🟢 已完善';

  // Member stats
  var memberStatsMap = {};
  D.members.forEach(function(m){ memberStatsMap[m.id] = memberStats(m); });
  var globalStats = { members:D.meta.totalMembers, policies:D.meta.totalPolicies, premium:D.meta.totalPremium, urgent:D.meta.urgentCount };

  function updateStats(s){
    var ns = document.querySelectorAll('#overview .stat-card .num');
    if(ns[0])ns[0].textContent=s.members; if(ns[1])ns[1].textContent=s.policies;
    if(ns[2])ns[2].textContent='¥'+s.premium.toLocaleString(); if(ns[3])ns[3].textContent=s.urgent;
  }
  function showMember(id){
    document.querySelectorAll('.member-card').forEach(function(c){ c.classList.add('hidden'); });
    document.querySelectorAll('.member-card[data-member="'+id+'"]').forEach(function(c){ c.classList.remove('hidden'); });
    document.querySelectorAll('.mn-btn').forEach(function(b){ b.classList.remove('active'); });
    var btn=document.getElementById('btn-'+id); if(btn){ btn.classList.add('active'); btn.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}); }
    updateStats(memberStatsMap[id]||globalStats);
    var cards=document.querySelectorAll('.member-card[data-member="'+id+'"]'); if(cards[0])cards[0].scrollIntoView({behavior:'smooth',block:'start'});
  }
  function showAll(){
    document.querySelectorAll('.member-card').forEach(function(c){ c.classList.remove('hidden'); });
    document.querySelectorAll('.mn-btn').forEach(function(b){ b.classList.remove('active'); });
    var btn=document.getElementById('btn-all'); if(btn)btn.classList.add('active');
    updateStats(globalStats);
  }
  document.getElementById('member-nav').addEventListener('click', function(e){
    var btn=e.target.closest('.mn-btn'); if(!btn)return;
    var m=btn.getAttribute('data-member'); if(!m)return;
    if(m==='all')showAll(); else if(memberStatsMap[m])showMember(m);
  });

  // Policy & rec toggle
  function togglePolicy(el){
    var card=el.closest('.policy-card'); if(!card)return;
    card.classList.toggle('collapsed');
    if(card.classList.contains('collapsed')){el.textContent='展开详情';el.classList.remove('expanded');}
    else{el.textContent='收起详情';el.classList.add('expanded');}
  }
  function toggleRec(el){
    var card=el.closest('.rec-card'); if(!card)return;
    card.classList.toggle('collapsed');
    if(card.classList.contains('collapsed')){el.textContent='展开对比';el.classList.remove('expanded');}
    else{el.textContent='收起对比';el.classList.add('expanded');}
  }
  document.querySelectorAll('.policy-card').forEach(function(card){
    card.classList.add('collapsed');
    var btn=document.createElement('span'); btn.className='policy-toggle-btn'; btn.textContent='展开详情';
    btn.onclick=function(e){e.stopPropagation();togglePolicy(btn);};
    var hdr=card.querySelector('.pc-header'); if(hdr)hdr.appendChild(btn);
  });
  document.querySelectorAll('.rec-card').forEach(function(card){
    card.classList.add('collapsed');
    var btn=document.createElement('span'); btn.className='rec-toggle-btn'; btn.textContent='展开对比';
    btn.onclick=function(e){e.stopPropagation();toggleRec(btn);};
    var hdr=card.querySelector('.rc-header'); if(hdr)hdr.appendChild(btn);
  });

  // Back to top
  var btt=document.getElementById('back-to-top');
  window.addEventListener('scroll', function(){ if(window.scrollY>600)btt.classList.add('visible'); else btt.classList.remove('visible'); });
  btt.addEventListener('click', function(){ window.scrollTo({top:0,behavior:'smooth'}); });

  // Active nav on scroll
  var navLinks=document.querySelectorAll('nav a');
  window.addEventListener('scroll', function(){
    var sp=window.scrollY+100;
    navLinks.forEach(function(link){
      var sec=document.querySelector(link.getAttribute('href'));
      if(sec && sec.offsetTop<=sp && sec.offsetTop+sec.offsetHeight>sp){ navLinks.forEach(function(l){l.classList.remove('active');}); link.classList.add('active'); }
    });
  });
});
</script>
</body>
</html>
